services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: poc-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # POC: disable security for simplicity
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g          # ~50% rule on 8GB Rancher VM
      - cluster.name=poc-cluster
      - node.name=poc-node-1
    mem_limit: 3g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'status'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - poc-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: poc-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=poc-kibana
      - I18N_LOCALE=en
    ports:
      - "5601:5601"
    networks:
      - poc-net

volumes:
  es_data:
    driver: local

networks:
  poc-net:
    driver: bridge